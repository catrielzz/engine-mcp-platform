name: test-unity-plugin

##############################################################################
# 1. Triggers
##############################################################################
on:
  workflow_call:
    inputs:
      projectPath: { required: true, type: string }
      unityVersion: { required: true, type: string }
      testMode: { required: true, type: string }

##############################################################################
# 2. Job
##############################################################################
jobs:
  test:
    name: ${{ inputs.unityVersion }} ${{ inputs.testMode }} on self-hosted windows
    runs-on: [self-hosted, windows, x64, unity, unity-tests]

    steps:
      # --------------------------------------------------------------------- #
      # 2-a. Checkout repository
      # --------------------------------------------------------------------- #
      - uses: actions/checkout@v6
        with:
          lfs: false

      # --------------------------------------------------------------------- #
      # 2-b. Run Unity tests via the local self-hosted wrapper
      # --------------------------------------------------------------------- #
      - uses: ./.github/actions/unity/run-tests
        id: tests
        with:
          project-path: ${{ inputs.projectPath }}
          unity-version: ${{ inputs.unityVersion }}
          test-mode: ${{ inputs.testMode }}
          artifacts-path: artifacts-${{ inputs.unityVersion }}-${{ inputs.testMode }}
          custom-parameters: -CI true -GITHUB_ACTIONS true

      # --------------------------------------------------------------------- #
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: Test results for ${{ inputs.unityVersion }} ${{ inputs.testMode }}
          path: ${{ steps.tests.outputs.artifacts-path }}

