  #   with:
  #     projectPath: "./Unity-Tests/6000.3.11f1"
  #     unityVersion: "6000.3.11f1"
  #     testMode: "playmode"
  #   secrets: inherit

  # --- STANDALONE ---

  test-unity-6000-3-11f1-standalone:
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/6000.3.11f1"
      unityVersion: "6000.3.11f1"
      testMode: "standalone"
    secrets: inherit

  # -------------------
