name: test-pull-request-manual

on:
  workflow_dispatch:

jobs:
  test-cli:
    uses: ./.github/workflows/test_cli.yml

  # --- UNITY TESTS ---
  # -------------------

  # --- EDIT MODE ---

  test-unity-6000-3-11f1-editmode:
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/6000.3.11f1"
      unityVersion: "6000.3.11f1"
      testMode: "editmode"
    secrets: inherit

  # --- PLAY MODE ---

