        run: |
          set -o pipefail
          pnpm exec tsx scripts/bench/check.ts --profile unity-bridge-approval | tee artifacts/bench/approval/unity-bridge-check-latest.json
      - name: Publish unity-bridge approval summary
        if: always()
        run: |
          if [ -f artifacts/bench/approval/unity-bridge-latest.json ]; then
            echo "# unity-bridge approval" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            pnpm exec tsx scripts/bench/report.ts --input artifacts/bench/approval/unity-bridge-latest.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# unity-bridge approval" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No approval artifact was generated for this job." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Publish unity-bridge approval gate summary
        if: always()
        run: |
          if [ -f artifacts/bench/approval/unity-bridge-check-latest.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            pnpm exec tsx scripts/bench/check-report.ts --input artifacts/bench/approval/unity-bridge-check-latest.json --title "unity-bridge approval gate" >> "$GITHUB_STEP_SUMMARY"
            pnpm exec tsx scripts/bench/check-report.ts --input artifacts/bench/approval/unity-bridge-check-latest.json --format workflow
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "# unity-bridge approval gate" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No gate report was generated for this job." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload unity-bridge approval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
